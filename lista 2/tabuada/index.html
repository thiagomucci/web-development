<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Tabuada</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Gerador de Tabuada</h1>
        <p class="subtitle">Digite um número para gerar a tabuada</p>
        <div class="input-group">
            <input type="number" id="num" placeholder="Ex: 5">
            <button id="botao">Gerar</button>
        </div>
        <ul id="lista"></ul>
    </div>
    <script src="script.js"></script>
</body>
</html>
